<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Operações</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#05080d,#111827,#05080d);
    color:#e6edf3;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    background:rgba(22,27,34,.95);
    border:1px solid #2f3d4d;
    border-radius:12px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,0,0,.6);
}

h1{
    color:#4fa3ff;
    margin-bottom:25px;
    letter-spacing:2px;
}

#mensagem{
    font-size:22px;
    line-height:1.8;
    min-height:160px;
    margin-bottom:30px;
}

button{
    background:#1f6feb;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:17px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#388bfd;
    transform:scale(1.05);
}

footer{
    margin-top:30px;
    color:#8b949e;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<h1>CENTRO DE OPERAÇÕES</h1>

<p id="mensagem">
Cada decisão molda o resultado. Observe, confirme os fatos e somente então avance. A pressa favorece o erro; a preparação favorece o sucesso.
</p>

<button onclick="novaMensagem()">
Receber Briefing
</button>

<footer>
Sistema de Análise Estratégica
</footer>

</div>

<script>

const mensagens=[

"Informação confiável vale mais do que dezenas de suposições.",

"Em momentos críticos, serenidade é uma ferramenta tão importante quanto conhecimento.",

"A disciplina permite enxergar oportunidades onde outros veem apenas obstáculos.",

"Questione evidências frágeis. Confirme aquilo que parece evidente.",

"Planejamento reduz incertezas. Execução consistente produz resultados.",

"Antes de agir, compreenda o cenário. Antes de concluir, reúna os fatos.",

"Confiança é conquistada por meio de decisões fundamentadas.",

"O melhor recurso de uma equipe é a capacidade de pensar com clareza sob pressão.",

"Nem toda resposta rápida é uma boa resposta. Precisão importa.",

"A estratégia começa quando a emoção deixa de comandar a decisão."

];

function novaMensagem(){

const indice=Math.floor(Math.random()*mensagens.length);

const texto=document.getElementById("mensagem");

texto.style.opacity=0;

setTimeout(()=>{
    texto.innerHTML=mensagens[indice];
    texto.style.opacity=1;
},250);

}

document.getElementById("mensagem").style.transition="opacity .25s";

</script>

</body>
</html>
