<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETI Deep Space Monitor</title>

<style>

body{
margin:0;
background:#000814;
color:#00ff88;
font-family:Consolas,monospace;
overflow:hidden;
}

canvas{
position:fixed;
inset:0;
z-index:-2;
}

body:before{
content:"";
position:fixed;
inset:0;
background:
repeating-linear-gradient(
transparent 0px,
rgba(0,255,120,.04) 2px,
transparent 4px);
animation:scan 6s linear infinite;
z-index:-1;
}

@keyframes scan{
from{transform:translateY(-100%);}
to{transform:translateY(100%);}
}

#painel{

width:92%;
max-width:1300px;

margin:20px auto;

border:1px solid #00ff88;

padding:20px;

background:rgba(0,10,5,.92);

box-shadow:0 0 25px #00ff88;

}

h1{
margin:0;
font-size:30px;
text-shadow:0 0 10px #00ff88;
}

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);

gap:15px;

margin:20px 0;

}

.card{

border:1px solid #00ff88;

padding:12px;

background:#02150d;

}

.card b{

color:#8fffca;

}

#terminal{

height:330px;

overflow:auto;

background:black;

padding:15px;

border:1px solid #00aa66;

white-space:pre-wrap;

font-size:15px;

line-height:1.5;

}

#mensagem{

margin-top:20px;

padding:15px;

border:1px solid #00ff88;

background:#02150d;

font-size:22px;

color:#9fffd7;

}

#status{

color:#00ff88;

animation:pulse 1s infinite;

}

@keyframes pulse{

50%{
opacity:.4;
}

}

</style>

</head>

<body>

<canvas id="space"></canvas>

<div id="painel">

<h1>SETI • DEEP SPACE RECEIVER</h1>

<div id="status">
● RECEBENDO PORTADORA DE BANDA ESTREITA
</div>

<div class="grid">

<div class="card">
<b>Origem</b><br>
Catálogo: GX-4819
</div>

<div class="card">
<b>Distância</b><br>
≈ 2,4 milhões de anos-luz
</div>

<div class="card">
<b>Frequência</b><br>
1420.405 MHz
</div>

<div class="card">
<b>SNR</b><br>
97.83 dB
</div>

</div>

<div id="terminal"></div>

<div id="mensagem">
AGUARDANDO DECODIFICAÇÃO...
</div>

</div>

<script>

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const stars=[];

for(let i=0;i<500;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2

});

}

function draw(){

ctx.fillStyle="#000814";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff88";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

s.y+=0.15;

if(s.y>canvas.height)s.y=0;

});

requestAnimationFrame(draw);

}

draw();

function byte(){

return Math.floor(Math.random()*256)
.toString(2)
.padStart(8,"0");

}

const terminal=document.getElementById("terminal");

let audioCtx=null;

function beep(freq,dur){

if(!audioCtx)
audioCtx=new(window.AudioContext||window.webkitAudioContext)();

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.type="sine";
osc.frequency.value=freq;

osc.connect(gain);
gain.connect(audioCtx.destination);

gain.gain.value=0.05;

osc.start();

setTimeout(()=>{

osc.stop();

},dur);

}

let linhas=0;

function receber(){

let linha="";

for(let i=0;i<12;i++)
linha+=byte()+" ";

terminal.textContent+=linha+"\n";

terminal.scrollTop=terminal.scrollHeight;

beep(500+Math.random()*800,80);

linhas++;

if(linhas==18){

document.getElementById("mensagem").innerHTML=`
SINAL DECODIFICADO

SUMÉRIO:
<br><br>

<font style="font-size:42px;color:#ffffff;">
𒍣
</font>

<br><br>

Transliteração: <b>ZI</b>

Significado: <b>VIDA</b>
`;

}

}

setInterval(receber,350);

</script>

</body>
</html>
