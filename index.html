<!DOCTYPE html>
<html lang="xx">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𖤓 ⟟ XÆ-Ω :: Portal Alienígena</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:
radial-gradient(circle at top,#2f0a57,#05010c 60%,#000);
color:#77fff7;
overflow:hidden;
height:100vh;
}

canvas{
position:fixed;
inset:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:20px;
text-align:center;
}

.logo{
font-size:65px;
margin-bottom:20px;
text-shadow:
0 0 15px cyan,
0 0 30px cyan,
0 0 60px cyan;
animation:pulse 2s infinite;
}

@keyframes pulse{

50%{
transform:scale(1.1);
}

}

h2{
font-size:28px;
letter-spacing:12px;
margin-bottom:10px;
}

.alien{
font-size:22px;
letter-spacing:8px;
line-height:2;
max-width:900px;
margin-bottom:30px;
color:#9ffff7;
}

.panel{

width:90%;
max-width:900px;

background:rgba(0,255,255,.05);

border:1px solid cyan;

border-radius:25px;

padding:30px;

backdrop-filter:blur(10px);

box-shadow:0 0 30px cyan;
}

.icons{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(120px,1fr));

gap:20px;

margin-top:25px;

}

.item{

padding:20px;

background:rgba(255,255,255,.04);

border-radius:20px;

transition:.4s;

cursor:pointer;

}

.item:hover{

transform:translateY(-8px) scale(1.08);

box-shadow:0 0 25px cyan;

background:rgba(0,255,255,.15);

}

.item i{

font-size:40px;

margin-bottom:10px;

display:block;

color:#00fff2;

}

.item div{

font-size:24px;

letter-spacing:6px;

}

button{

margin-top:30px;

padding:16px 45px;

font-size:18px;

border:none;

border-radius:40px;

background:#00fff2;

color:black;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 30px cyan;

}

#texto{

margin-top:30px;

font-size:24px;

color:white;

min-height:40px;

text-shadow:0 0 15px cyan;

}

.scan{

position:absolute;

top:0;

left:-100%;

width:100%;

height:4px;

background:cyan;

box-shadow:0 0 20px cyan;

animation:scan 4s linear infinite;

}

@keyframes scan{

100%{

left:100%;

}

}

footer{

position:absolute;

bottom:15px;

font-size:14px;

opacity:.5;

letter-spacing:5px;

}
</style>

</head>

<body>

<canvas id="space"></canvas>

<div class="container">

<div class="scan"></div>

<div class="logo">
☉ ⟁ 𖤓 ⌬ ⟟ Ω
</div>

<div class="panel">

<h2>⟒ ⍜ ⊬ ☍</h2>

<p class="alien">
⟒⌬𖤓 ☉⍜⌬ ⟁⌬⊬ ⍜⍜☍ ⟟𖤓⌬ ⊬☉⌬
<br><br>
𖤓 ⌬⟁ ☉⍜ ⟒⟟⍜ ⊬⌬ ☍☉ 𖤓⌬⌬
<br><br>
☉⌬⍜ ⟁☉𖤓 ⊬☍⌬ ⍜⟒⌬ ☉☉☉ ⌬⌬⌬
</p>

<div class="icons">

<div class="item">
<i class="fa-solid fa-atom"></i>
<div>⌬⟁☉</div>
</div>

<div class="item">
<i class="fa-solid fa-satellite-dish"></i>
<div>𖤓☍⌬</div>
</div>

<div class="item">
<i class="fa-solid fa-meteor"></i>
<div>⊬☉⌬</div>
</div>

<div class="item">
<i class="fa-solid fa-star"></i>
<div>⍜⌬𖤓</div>
</div>

<div class="item">
<i class="fa-solid fa-globe"></i>
<div>☉☉☉</div>
</div>

<div class="item">
<i class="fa-solid fa-rocket"></i>
<div>⟁⟁⟁</div>
</div>

</div>

<button onclick="traduzir()">
⟒ ATIVAR DECODIFICADOR
</button>

<div id="texto"></div>

</div>

<footer>

𖤓 ⌬⟁ ☉⍜ ⊬☉⌬ ⟟𖤓☍ 000111101010

</footer>

</div>

<script>
const frases=[
"☉ = SOL CENTRAL",
"⌬ = PORTAL QUÂNTICO",
"𖤓 = ENERGIA VITAL",
"⟁ = MATRIZ GALÁCTICA",
"⊬ = NAVE BIOLÓGICA",
"☍ = CONSCIÊNCIA COLETIVA",
"⟒⟟⍜ = BEM-VINDO VIAJANTE",
"⍜⌬☉ = SISTEMA XÆ-91",
"☉☉☉ = UNIVERSO PRIMÁRIO",
"⌬⌬⌬ = FREQUÊNCIA 884.77"
];

function traduzir(){
document.getElementById("texto").innerHTML=
frases[Math.floor(Math.random()*frases.length)];
}

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
s:Math.random()*1.5+0.2
});
}

function draw(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#7ff";

for(let star of stars){

ctx.beginPath();

ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

ctx.fill();

star.y+=star.s;

if(star.y>canvas.height){

star.y=0;

star.x=Math.random()*canvas.width;

}

}

requestAnimationFrame(draw);

}

draw();

setInterval(()=>{

const chars="☉⌬⟁⊬☍⟒⟟⍜𖤓Ω∆◉◈⬢";

const p=document.querySelector(".alien");

let txt="";

for(let i=0;i<90;i++){

txt+=chars[Math.floor(Math.random()*chars.length)];

if(i%18==0) txt+="<br>";

}

p.innerHTML=txt;

},4000);
</script>

</body>
</html>
