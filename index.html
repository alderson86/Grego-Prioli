<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOCOLO // LINK DESCONHECIDO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020304;
    color:#00ff88;
    font-family:Consolas,monospace;
    overflow:hidden;
}

/* Fundo */
canvas{
    position:fixed;
    inset:0;
    z-index:-2;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        transparent 0px,
        rgba(0,255,150,.03) 2px,
        transparent 4px
    );
    animation:scan 8s linear infinite;
    z-index:-1;
}

@keyframes scan{
from{transform:translateY(-100%);}
to{transform:translateY(100%);}
}

#terminal{

width:95%;
max-width:1200px;

margin:25px auto;

background:rgba(0,15,8,.90);

border:1px solid #00ff88;

padding:20px;

box-shadow:
0 0 10px #00ff88,
0 0 30px rgba(0,255,136,.3);

}

h1{

color:#7dffcb;
margin-bottom:10px;
text-shadow:0 0 15px #00ff88;

}

.status{

display:flex;
gap:20px;
margin:20px 0;
flex-wrap:wrap;

}

.card{

flex:1;
min-width:220px;

border:1px solid #00ff88;
padding:10px;

background:#02140d;

}

.card h3{

color:#8fffd5;
margin-bottom:10px;

}

#stream{

height:320px;

overflow:auto;

white-space:pre-wrap;

background:black;

padding:15px;

border:1px solid #00aa55;

line-height:1.5;

}

button{

margin-top:20px;

padding:12px 25px;

background:#00aa55;

border:none;

color:white;

cursor:pointer;

font-size:16px;

transition:.3s;

}

button:hover{

background:#00dd77;

box-shadow:0 0 15px #00ff88;

}

#translate{

margin-top:20px;

color:#8fffd5;

font-size:18px;

}

.blink{

animation:blink 1s infinite;

}

@keyframes blink{

50%{opacity:0;}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="terminal">

<h1>TRANSMISSÃO EXTRASSOLAR</h1>

<p>Estado do Canal:
<span class="blink">●</span>
Conectado</p>

<div class="status">

<div class="card">
<h3>Frequência</h3>
<div id="freq">1420.405 MHz</div>
</div>

<div class="card">
<h3>Intensidade</h3>
<div id="signal">98.42%</div>
</div>

<div class="card">
<h3>Origem</h3>
<div>DESCONHECIDA</div>
</div>

<div class="card">
<h3>Codificação</h3>
<div>BINÁRIO 8 BITS</div>
</div>

</div>

<div id="stream"></div>

<button onclick="novaTransmissao()">
Capturar Nova Transmissão
</button>

<div id="translate">

AGUARDANDO DECODIFICAÇÃO...

</div>

</div>

<script>

/* Fundo estrelado */

const canvas=document.getElementById("stars");

const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const estrelas=[];

for(let i=0;i<350;i++){

estrelas.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2

});

}

function desenhar(){

ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff88";

for(let s of estrelas){

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

s.y+=0.2;

if(s.y>canvas.height)s.y=0;

}

requestAnimationFrame(desenhar);

}

desenhar();

/* Comunicação */

function byte(){

return Math.floor(Math.random()*256)
.toString(2)
.padStart(8,"0");

}

const traducoes=[

"SINAL RECEBIDO",

"PACOTE CORROMPIDO",

"SEQUÊNCIA ESTÁVEL",

"PADRÃO DESCONHECIDO",

"PROTOCOLO NÃO CATALOGADO",

"ANALISANDO",

"INTERFERÊNCIA DETECTADA",

"SINCRONIZAÇÃO PARCIAL",

"ESTRUTURA REPETITIVA",

"PACOTE ACEITO"

];

function novaTransmissao(){

let texto="";

for(let i=0;i<24;i++){

for(let j=0;j<10;j++){

texto+=byte()+" ";

}

texto+="\n";

}

document.getElementById("stream").textContent=texto;

document.getElementById("translate").innerHTML=
"> "+traducoes[Math.floor(Math.random()*traducoes.length)];

document.getElementById("signal").innerHTML=
(90+Math.random()*10).toFixed(2)+"%";

document.getElementById("freq").innerHTML=
(1400+Math.random()*50).toFixed(3)+" MHz";

}

novaTransmissao();

setInterval(novaTransmissao,6000);

</script>

</body>
</html>
